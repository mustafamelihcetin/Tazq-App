services:
  tazq-db:
    image: postgres:17
    container_name: tazq-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "65432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tazqadmin -d tazqdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  tazq-redis:
    image: redis:alpine
    container_name: tazq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tazq-backend:
    build:
      context: ./Tazq-Backend
      dockerfile: DockerFile
    container_name: tazq-backend
    env_file:
      - .env
    environment:
      - REDIS_URL=tazq-redis:6379
    expose:
      - "80"
    depends_on:
      tazq-db:
        condition: service_healthy
      tazq-redis:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: tazq-proxy
    ports:
      - "5200:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - tazq-backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
