  window.addEventListener('DOMContentLoaded', () => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      const r = 29;
      ctx.beginPath();
      ctx.moveTo(r, 0); ctx.lineTo(128-r, 0); ctx.quadraticCurveTo(128, 0, 128, r);
      ctx.lineTo(128, 128-r); ctx.quadraticCurveTo(128, 128, 128-r, 128);
      ctx.lineTo(r, 128); ctx.quadraticCurveTo(0, 128, 0, 128-r);
      ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.clip();
      ctx.drawImage(img, 0, 0, 128, 128);
      document.querySelectorAll("link[rel~='icon']").forEach(l => {
        if(l.rel === 'icon') l.href = canvas.toDataURL();
      });
    };
    img.src = '/images/icon.png';
  });

I have read and understood this statement and provide my consent freely and voluntarily.` } }

let curDoc = "privacy", curLang = "tr";

function render(){
  document.documentElement.lang = curLang;
  document.querySelectorAll("#tabs .tab").forEach(b=>{
    b.textContent = TABS[curLang][b.dataset.doc];
    b.classList.toggle("active", b.dataset.doc===curDoc);
  });
  document.querySelectorAll("#lang button").forEach(b=>
    b.classList.toggle("active", b.dataset.lang===curLang));
  document.querySelector("[data-i18n='tagline']").textContent = UI[curLang].tagline;
  document.querySelector("[data-i18n='legalLabel']").textContent = UI[curLang].legal;
  document.querySelector("[data-i18n='home']").textContent = UI[curLang].home;
  try{ localStorage.setItem('tazq-lang', curLang); }catch(e){}
  document.getElementById("docTitle").textContent = DOCS[curDoc].title[curLang];
  document.getElementById("docBody").textContent = DOCS[curDoc].body[curLang];
  window.scrollTo({top:0,behavior:"instant"});
  if(history.replaceState) history.replaceState(null,"","#"+curDoc);
}
document.getElementById("tabs").addEventListener("click",e=>{
  const b=e.target.closest(".tab"); if(!b)return; curDoc=b.dataset.doc; render();
});
document.getElementById("lang").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return; curLang=b.dataset.lang; render();
});
(function(){
  var saved; try{ saved=localStorage.getItem('tazq-lang'); }catch(e){}
  var urlLang=(location.search.match(/[?&]lang=(tr|en)/)||[])[1];
  function det(){ try{ if((Intl.DateTimeFormat().resolvedOptions().timeZone||'')==='Europe/Istanbul') return 'tr'; }catch(e){} var l=((navigator.language||'')+'').toLowerCase(); return l.indexOf('tr')===0?'tr':'en'; }
  curLang = urlLang || saved || det();
})();
const h=(location.hash||"").replace("#",""); if(DOCS[h]) curDoc=h;
render();
</script>
